# jPOS EE System Properties
# Configure enterprise jPOS settings

# Server Configuration
server.name=jposee-server
server.port=5000
server.backlog=50

# Database Configuration (uncomment if using enterprise DB)
# db.driver=org.postgresql.Driver
# db.url=jdbc:postgresql://cms-postgresql:5432/jposee
# db.user=jposee_user
# db.password=${JPOSEE_DB_PASSWORD}

# Logging Configuration
log.level=info
log.dir=log
log.name=q2ee.log

# Performance Tuning
thread.pool.size=20
queue.size=1000
max.connections=100

# Security
security.realm=jposee-realm
# ssl.keystore=config/keystore.p12
# ssl.keystore.password=${JPOSEE_KEYSTORE_PASSWORD}

# Integration
backend.host=cms-backend
backend.port=8000
backend.timeout=30000

# Enterprise Features (jPOS EE only)
# batch.enabled=true
# batch.schedule=0 0 * * * ?
# audit.enabled=true
# clustering.enabled=false

# Custom Properties
app.name=CMS-Platform-jPOS-EE
app.version=2.1.8
app.environment=development
