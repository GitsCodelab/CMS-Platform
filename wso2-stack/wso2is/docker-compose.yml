version: '3.8'

services:
  cms-wso2is:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cms-wso2is
    hostname: is.local
    depends_on:
      cms-postgresql:
        condition: service_started
    environment:
      # Database Configuration
      DB_TYPE: postgresql
      DB_HOSTNAME: cms-postgresql
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_NAME: wso2is
      
      # Server Configuration
      CARBON_HOME: /home/wso2carbon/wso2is-7.0.0
      JAVA_OPTS: >
        -Xms256m -Xmx1024m
        -XX:+UseG1GC
        -XX:MaxGCPauseMillis=20
      
      # Admin credentials
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: admin
      
      # Hostname configuration
      HOSTNAME: is.local
      PORT: 9443
    
    ports:
      # HTTPS ports
      - "4443:4443"      # HTTPS
      - "9443:9443"      # Admin console
      
      # HTTP ports
      - "8280:8280"      # HTTP
      - "8243:8243"      # HTTPS gateway
      
      # Management ports
      - "9711:9711"      # Remote debugging
      - "9763:9763"      # HTTP
    
    volumes:
      - wso2is-data:/home/wso2carbon/wso2is-7.0.0/repository/data
      - wso2is-logs:/home/wso2carbon/wso2is-7.0.0/repository/logs
      - ./conf:/home/wso2carbon/wso2is-7.0.0/repository/conf:ro
    
    networks:
      - cms-platform-net
    
    healthcheck:
      test: ["CMD", "curl", "-k", "-f", "https://localhost:9443/api/identity/auth/v1.0/token"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

volumes:
  wso2is-data:
    driver: local
  wso2is-logs:
    driver: local

networks:
  cms-platform-net:
    external: true
