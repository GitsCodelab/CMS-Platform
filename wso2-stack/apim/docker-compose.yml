version: '3.8'

services:
  cms-apim:
    image: wso2/wso2am:4.3.0
    container_name: cms-apim
    hostname: apim.local

    depends_on:
      cms-postgresql:
        condition: service_healthy

    environment:
      DB_DRIVER: org.postgresql.Driver
      DB_TYPE: postgresql
      DB_HOSTNAME: cms-postgresql
      DB_PORT: 5432
      DB_NAME: wso2am
      DB_USERNAME: postgres
      DB_PASSWORD: postgres

      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: admin

      API_MANAGER_HOSTNAME: apim.local
      API_MANAGER_HTTP_PORT: 9763
      API_MANAGER_HTTPS_PORT: 9443

      API_GATEWAY_HOST: apim.local
      API_GATEWAY_HTTP_PORT: 8280
      API_GATEWAY_HTTPS_PORT: 8243

    ports:
      - "8280:8280"
      - "8243:8243"
      - "9443:9443"

    volumes:
      - wso2am-data:/home/wso2carbon/wso2am-4.3.0/repository/data
      - wso2am-logs:/home/wso2carbon/wso2am-4.3.0/repository/logs
      - ./deployment.toml:/home/wso2carbon/wso2am-4.3.0/repository/conf/deployment.toml

    networks:
      cms-platform-net:
        aliases:
          - apim.local   # 🔥 مهم جدًا عشان باقي containers تشوفه

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "curl", "-k", "-f", "https://apim.local:9443/api/am/admin/v0.17/system-info"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

volumes:
  wso2am-data:
  wso2am-logs:

networks:
  cms-platform-net:
    external: true