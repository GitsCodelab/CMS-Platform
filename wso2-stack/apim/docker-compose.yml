# WSO2 API Manager Docker Compose Configuration
# This file defines the WSO2 APIM service

version: '3.8'

services:
  cms-apim:
    image: wso2/wso2am:4.0.0
    container_name: cms-apim
    hostname: cms-apim
    depends_on:
      cms-postgresql:
        condition: service_started
    environment:
      # Database Configuration
      DB_DRIVER: org.postgresql.Driver
      DB_TYPE: postgresql
      DB_HOSTNAME: cms-postgresql
      DB_PORT: 5432
      DB_NAME: wso2am
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      
      # Admin User
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: admin
      
      # API Manager Configuration
      API_GATEWAY_HOST: cms-apim
      API_GATEWAY_HTTP_PORT: 8280
      API_GATEWAY_HTTPS_PORT: 8243
    ports:
      - "8280:8280"      # API Gateway (HTTP)
      - "8243:8243"      # API Gateway (HTTPS)
      - "9443:9443"      # Admin/Publisher Console (HTTPS)
      - "9611:9611"      # Analytics (optional)
    volumes:
      # Mount custom configuration if needed
      # - ./api-manager.xml:/home/wso2carbon/wso2am-4.1.0/repository/conf/api-manager.xml
      # Mount data for persistence
      - wso2am-data:/home/wso2carbon/wso2am-4.1.0/repository/data
      - wso2am-logs:/home/wso2carbon/wso2am-4.1.0/repository/logs
    networks:
      - cms-platform-net
    healthcheck:
      test: ["CMD", "curl", "-f", "https://localhost:9443/api/am/admin/v0.17/system-info", "-k"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

volumes:
  wso2am-data:
    driver: local
  wso2am-logs:
    driver: local

networks:
  cms-platform-net:
    driver: bridge
