[server]
hostname = "localhost"
node_ip = "0.0.0.0"
base_path = "https://localhost:9443"
server_name = "WSO2 API Manager"

[apim]
enable_gateway = true

[deployment]
deployment_pattern = "hybrid"

[super_admin]
username = "admin"
password = "admin"
create_admin_account = true

[user_store]
type = "database_unique_id"

# ================= DATABASE =================

[database.identity_db]
type = "postgres"
url = "jdbc:postgresql://cms-postgresql:5432/wso2am"
username = "postgres"
password = "postgres"
driver = "org.postgresql.Driver"

[database.shared_db]
type = "postgres"
url = "jdbc:postgresql://cms-postgresql:5432/wso2am"
username = "postgres"
password = "postgres"
driver = "org.postgresql.Driver"

[database.apim_db]
type = "postgres"
url = "jdbc:postgresql://cms-postgresql:5432/wso2am"
username = "postgres"
password = "postgres"
driver = "org.postgresql.Driver"

# ================= SECURITY =================

[keystore.primary]
file_name = "wso2carbon.jks"
password = "wso2carbon"
type = "JKS"

[truststore]
file_name = "client-truststore.jks"
password = "wso2carbon"
type = "JKS"

# ================= API GATEWAY =================

[api_gateway]
enable = true
endpoint_host = "cms-apim"
endpoint_http_port = 8280
endpoint_https_port = 8243

api_endpoint_host = "cms-apim"
api_endpoint_http_port = 8280
api_endpoint_https_port = 8243

web_sub_event_receiver_http_port = 9021
web_sub_event_receiver_https_port = 8021

# ================= OAUTH =================

[[oauth.grant_types]]
name = "authorization_code"
enable = true

# ================= KEY MANAGER =================

# Use default (Resident) key manager only
# [[apim.key_manager]]
# server_url = "https://localhost:9443"
# username = "admin"
# password = "admin"
# type = "WSO2-IS"
# configuration.TokenEndpoint = "https://localhost:9443/oauth2/token"
# configuration.RevokeEndpoint = "https://localhost:9443/oauth2/revoke"
# configuration.UserInfoEndpoint = "https://localhost:9443/oauth2/userinfo"

# ================= ANALYTICS =================

[apim.analytics]
enable = false

# ================= THROTTLING =================

[apim.throttling]
enable = false

# ================= PORTAL URLS =================

[apim.devportal]
url = "https://localhost:9443/devportal"

[apim.publisher]
url = "https://localhost:9443/publisher"

[apim.admin]
url = "https://localhost:9443/admin"


[cors]
enable = true
allow_origins = ["*"]
allow_methods = ["GET", "POST", "PUT", "DELETE", "OPTIONS"]
allow_headers = ["authorization", "Access-Control-Allow-Origin", "Content-Type"]


[[apim.gateway.environment]]
name = "Default"
type = "hybrid"
display_name = "Default Gateway"
description = "Default production gateway"
service_url = "https://localhost:9443/services/"
username = "admin"
password = "admin"
ws_endpoint = "ws://localhost:9099"
wss_endpoint = "wss://localhost:8099"
http_endpoint = "http://localhost:8280"
https_endpoint = "https://localhost:8243"