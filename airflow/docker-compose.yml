x-airflow-common:
  &airflow-common
  build:
    context: ./airflow
    dockerfile: Dockerfile-oracle
  image: local/airflow:oracle
  environment:
    &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__CORE__LOAD_DEFAULT_CONNECTIONS: 'false'
    # AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres:5432/airflow
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__ENABLE_TASK_SDK: 'false'
    # Logging configuration
    AIRFLOW__LOGGING__BASE_LOG_FOLDER: /opt/airflow/logs
    AIRFLOW__LOGGING__REMOTE_LOGGING: 'False'
    AIRFLOW__LOGGING__LOGGING_LEVEL: INFO
    # Ensure log server host/port are set so task log URLs include a host
    AIRFLOW__LOGGING__LOG_SERVER_HOST: cms-airflow
    AIRFLOW__LOGGING__LOG_SERVER_PORT: 8793
    # Oracle connection (set in airflow/.env or your environment). Example:
    # AIRFLOW_CONN_ORACLE_MAIN=oracle+oracledb://user:pass@host:1521/?service_name=xepdb1
    AIRFLOW_CONN_ORACLE_MAIN: ${AIRFLOW_CONN_ORACLE_MAIN:-}
    AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_USERS: airflow:admin,viewer:viewer
    AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_PASSWORDS_FILE: /opt/airflow/simple_auth_manager_passwords.json
    AIRFLOW_UID: 50000
  volumes:
    - ${PWD}/airflow/dags:/opt/airflow/dags
    - ${PWD}/airflow/logs:/opt/airflow/logs
    - ${PWD}/airflow/plugins:/opt/airflow/plugins
    - ${PWD}/airflow/simple_auth_manager_passwords.json:/opt/airflow/simple_auth_manager_passwords.json
    - ${PWD}/airflow/scripts:/opt/airflow/scripts
  user: "50000:0"
  networks:
    - cms-platform-net

services:
  airflow-postgres:
    image: postgres:15
    container_name: airflow-postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    networks:
      - cms-platform-net

  airflow-init:
    <<: *airflow-common
    container_name: airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - "/opt/airflow/scripts/airflow-init.sh"
    depends_on:
      airflow-postgres:
        condition: service_healthy

  airflow-api-server:
    <<: *airflow-common
    container_name: airflow-api-server
    command: standalone
    healthcheck:
      # Airflow 3.0 API uses /public/v1/health or /ui/
      test: ["CMD", "curl", "--fail", "http://localhost:8080/ui/"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    depends_on:
      - airflow-postgres
      - airflow-init

volumes:
  postgres-data: {}

networks:
  cms-platform-net:
    external: true