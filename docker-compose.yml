services:
  cms-oracle-xe:
    image: gvenzl/oracle-xe:21.3.0
    container_name: cms-oracle-xe
    ports:
      - "1521:1521" # Oracle default port
      - "5500:5500" # Oracle EM Express port
    environment:
      ORACLE_PASSWORD: "oracle"
    volumes:
      - oracle-data:/opt/oracle/oradata # Persistent volume for Oracle data
    networks:
      - cms-platform-net

  cms-postgresql:
    image: postgres:15.3
    container_name: cms-postgresql
    ports:
      - "5432:5432" # PostgreSQL default port
    environment:
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "postgres"
      POSTGRES_DB: "cms"
    volumes:
      - postgres-data:/var/lib/postgresql/data # Persistent volume for PostgreSQL data
    networks:
      - cms-platform-net

  cms-airflow:
    image: apache/airflow:3.0.0
    container_name: cms-airflow
    command: ["standalone"]
    depends_on:
      cms-postgresql:
        condition: service_started
      cms-oracle-xe:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/ui/"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    env_file:
      - ./airflow/.env
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://postgres:postgres@cms-postgresql:5432/cms
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - ./airflow/simple_auth_manager_passwords.json:/opt/airflow/simple_auth_manager_passwords.json
      - ./airflow/scripts:/opt/airflow/scripts
    ports:
      - "8080:8080"
    networks:
      - cms-platform-net

  cms-backend:
    image: python:3.12-slim
    container_name: cms-backend
    working_dir: /app
    command: sh -c "pip install --no-cache-dir -r requirements.txt && python main.py"
    depends_on:
      cms-postgresql:
        condition: service_started
      cms-oracle-xe:
        condition: service_started
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    networks:
      - cms-platform-net

volumes:
  oracle-data:
    driver: local
  postgres-data:
    driver: local
  airflow-data:
    driver: local

networks:
  cms-platform-net:
    driver: bridge