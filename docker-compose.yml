version: '3.9'

services:
  oracle-xe:
    image: gvenzl/oracle-xe:21.3.0
    container_name: oracle-xe
    ports:
      - "1521:1521" # Oracle default port
      - "5500:5500" # Oracle EM Express port
    environment:
      ORACLE_PASSWORD: "oracle"
    volumes:
      - oracle-data:/opt/oracle/oradata # Persistent volume for Oracle data
    networks:
      - cms-platform-net

  postgresql:
    image: postgres:15.3
    container_name: postgres
    ports:
      - "5432:5432" # PostgreSQL default port
    environment:
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "postgres"
      POSTGRES_DB: "cms"
    volumes:
      - postgres-data:/var/lib/postgresql/data # Persistent volume for PostgreSQL data
    networks:
      - cms-platform-net

volumes:
  oracle-data:
    driver: local
  postgres-data:
    driver: local

networks:
  cms-platform-net:
    driver: bridge