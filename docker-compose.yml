services:
  cms-oracle-xe:
    image: gvenzl/oracle-xe:21.3.0
    container_name: cms-oracle-xe
    ports:
      - "1521:1521" # Oracle default port
      - "5500:5500" # Oracle EM Express port
    environment:
      ORACLE_PASSWORD: "oracle"
    volumes:
      - oracle-data:/opt/oracle/oradata # Persistent volume for Oracle data
    networks:
      - cms-platform-net

  cms-postgresql:
    image: postgres:15.3
    container_name: cms-postgresql
    ports:
      - "5432:5432" # PostgreSQL default port
    environment:
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "postgres"
      POSTGRES_DB: "cms"
    volumes:
      - postgres-data:/var/lib/postgresql/data # Persistent volume for PostgreSQL data
    networks:
      - cms-platform-net

  cms-airflow:
    image: apache/airflow:3.0.0
    container_name: cms-airflow
    command: ["standalone"]
    depends_on:
      cms-postgresql:
        condition: service_started
      cms-oracle-xe:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/ui/"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    env_file:
      - ./airflow/.env
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://postgres:postgres@cms-postgresql:5432/cms
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - ./airflow/simple_auth_manager_passwords.json:/opt/airflow/simple_auth_manager_passwords.json
      - ./airflow/scripts:/opt/airflow/scripts
    ports:
      - "8080:8080"
    networks:
      - cms-platform-net

  cms-backend:
    image: python:3.12-slim
    container_name: cms-backend
    working_dir: /app
    command: sh -c "pip install --no-cache-dir -r requirements.txt && python run.py"
    depends_on:
      cms-postgresql:
        condition: service_started
      cms-oracle-xe:
        condition: service_started
    env_file:
      - ./backend/.env
    environment:
      # Override localhost with Docker service names for container networking
      POSTGRES_HOST: cms-postgresql
      ORACLE_HOST: cms-oracle-xe
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    networks:
      - cms-platform-net

  cms-frontend:
    image: node:18-alpine
    container_name: cms-frontend
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    depends_on:
      cms-backend:
        condition: service_started
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
      - "5173:5173"
    environment:
      - VITE_API_URL=http://cms-backend:8000
    networks:
      - cms-platform-net

  cms-apim:
    build:
      context: ./wso2-stack/apim
      dockerfile: Dockerfile
    container_name: cms-apim
    hostname: localhost
    depends_on:
      cms-postgresql:
        condition: service_started
    ports:
      - "8280:8280"      # API Gateway (HTTP)
      - "8243:8243"      # API Gateway (HTTPS)
      - "9443:9443"      # Admin/Publisher Console (HTTPS)
      - "9611:9611"      # Analytics
    volumes:
      - wso2am-data:/home/wso2carbon/wso2am-4.1.0/repository/data
      - wso2am-logs:/home/wso2carbon/wso2am-4.1.0/repository/logs
    networks:
      - cms-platform-net
    healthcheck:
      test: ["CMD", "curl", "-f", "https://localhost:9443/api/am/admin/v0.17/system-info", "-k"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  cms-jpos-ee:
    build:
      context: ./jpos-ee
      dockerfile: Dockerfile
    container_name: cms-jpos-ee
    hostname: cms-jpos-ee
    depends_on:
      cms-backend:
        condition: service_started
    ports:
      - "8583:8583"      # ISO 8583 Message Gateway
    volumes:
      - ./jpos-ee/config:/app/config
      - ./jpos-ee/logs:/app/logs
    networks:
      - cms-platform-net
    environment:
      - JAVA_OPTS=-Xmx512m -Xms256m
      - LOG_LEVEL=INFO
      - JPOS_PORT=8583
      - JPOS_SOCKET_TIMEOUT_MS=5000
      - JPOS_MAX_MESSAGE_LENGTH=4096
      - JPOS_MAX_CLIENTS=32
      - JPOS_REPLAY_WINDOW_SECONDS=300
      - JPOS_REQUIRE_MAC=true
      - JPOS_REQUIRE_TLS=false
      - JPOS_BDK_HEX=${JPOS_BDK_HEX:-0123456789ABCDEFFEDCBA9876543210}
      - JPOS_MAC_KEY_HEX=${JPOS_MAC_KEY_HEX:-2D4F5A7B9E1C3F8A5D2E9B6C4A1F7E3B9D2C5F8A1E7B4A9}
    healthcheck:
      test: ["CMD-SHELL", "bash -lc 'echo > /dev/tcp/127.0.0.1/8583'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    labels:
      - "component=payment-gateway"
      - "module=jpos-ee"

volumes:
  oracle-data:
    driver: local
  postgres-data:
    driver: local
  airflow-data:
    driver: local
  wso2am-data:
    driver: local
  wso2am-logs:
    driver: local

networks:
  cms-platform-net:
    driver: bridge