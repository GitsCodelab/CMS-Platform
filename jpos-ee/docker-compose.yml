services:
  cms-jpos-ee:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cms-jpos-ee
    hostname: cms-jpos-ee
    ports:
      - "8583:8583"  # ISO 8583 message gateway
    env_file:
      - .env
    environment:
      - JAVA_OPTS=-Xmx512m -Xms256m
      - LOG_LEVEL=INFO
      - JPOS_PORT=8583
      - JPOS_SOCKET_TIMEOUT_MS=5000
      - JPOS_MAX_MESSAGE_LENGTH=4096
      - JPOS_MAX_CLIENTS=32
      - JPOS_REPLAY_WINDOW_SECONDS=300
      - JPOS_REQUIRE_MAC=true
      - JPOS_REQUIRE_TLS=false
      - JPOS_BDK_HEX=0123456789ABCDEFFEDCBA9876543210
      - JPOS_MAC_KEY_HEX=2D4F5A7B9E1C3F8A5D2E9B6C4A1F7E3B9D2C5F8A1E7B4A90
    volumes:
      - ./config:/app/config
      - ./logs:/app/logs
    networks:
      - cms-platform-net
    healthcheck:
      test: ["CMD-SHELL", "bash -lc 'echo > /dev/tcp/127.0.0.1/8583'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    labels:
      - "component=payment-gateway"
      - "module=jpos-ee"

networks:
  cms-platform-net:
    driver: bridge
